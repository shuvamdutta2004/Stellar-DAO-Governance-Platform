name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NEXT_PUBLIC_STELLAR_NETWORK: testnet
  NEXT_PUBLIC_STELLAR_RPC_URL: https://soroban-testnet.stellar.org
  NEXT_PUBLIC_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
  NEXT_PUBLIC_TREASURY_CONTRACT_ID: CANWI4UO2NHX3PJD6VDSHTXJHNPRBATL5VRBDCNQATUQW2LUWF4YM4JP
  NEXT_PUBLIC_HORIZON_URL: https://horizon-testnet.stellar.org
  NEXT_PUBLIC_NATIVE_TOKEN_ADDRESS: CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCYSC

jobs:
  # ── Frontend CI ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Lint + Build + Test)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint

      - name: Run frontend tests
        run: npm run test

      - name: Build Next.js application
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 7

  # ── Smart Contract CI ────────────────────────────────────────────────────────
  contract:
    name: Smart Contract (Rust Tests)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run contract unit tests
        run: cargo test --manifest-path contracts/treasury/Cargo.toml
        env:
          RUST_BACKTRACE: 1

      - name: Build contract (release WASM)
        run: cargo build --manifest-path contracts/treasury/Cargo.toml --target wasm32-unknown-unknown --release

      - name: Check WASM artifact exists
        run: |
          ls -lh target/wasm32-unknown-unknown/release/treasury.wasm
          echo "Contract size: $(wc -c < target/wasm32-unknown-unknown/release/treasury.wasm) bytes"
